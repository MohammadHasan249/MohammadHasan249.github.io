<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Mohammad Hasan</title>

    <link rel="stylesheet" text="type/css" href="css/superslides.css">
    <link rel="stylesheet" text="type/css" href="css/owl.carousel.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <link rel="stylesheet" text="type/css" href="css/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">
  </head>
  <body>

    <div id="slides">

      <div class="overlay"></div>

      <div class="slides-container">
        <img src="images/slide1.jpg" alt="">
        <img src="images/slide2.jpg" alt="">
        <img src="images/slide3.jpg" alt="">
      </div>

      <div class="mainTitle">
        <div class="heading">
          <p class="name">MOHAMMAD HASAN</p>
          <p class="role typed">

          </p>
        </div>
      </div>

    </div>

    <div class="section" id="about">

      <div class="container">

          <div class="row">

              <div class="col-md-5">
                  <img id="avatar" src="images/avatar.png" alt="My avatar">
              </div>

              <div class="col-md-7">
                  <h1>Hi, my name is Mohammad Hasan.</h1>
                  <p id="aboutDescription" class="bold">Honours Bachelors of Computer Science @ University of Toronto</p>
                  <p></p>
              </div>

          </div>

      </div>

    </div>

    <div class="skillsSection section" id="skills">

      <div class="container">

          <div class="row">

              <div class="col-md-12 text-center">
                  <h1>Technical Skills</h1>
                  <p class="bold">Languages, Frameworks & Libraries (swipe!)</p>
              </div>

              <div id="languagesdiv" class="col-md-12 text-center">
                  <h4 class="bold">Languages</h4>
              </div>

              <div class="owl-carousel owl-theme">

                      <div class="cardnew">
                          <div class="content">
                              <img src="images/skills/react.png" alt="ReactJS">
                              <h2>React</h2>
                          </div>
                      </div>

                      <div class="cardnew whitebackground">
                          <div class="content">
                              <img src="images/skills/html.png" alt="HTML5">
                              <h2>HTML5</h2>
                          </div>
                      </div>

                      <div class="cardnew">
                          <div class="content">
                              <img src="images/skills/python.png" alt="Python">
                              <h2>Python</h2>
                          </div>
                      </div>

                      <div class="cardnew whitebackground">
                          <div class="content">
                              <img src="images/skills/java.png" alt="Java">
                              <h2>Java</h2>
                          </div>
                      </div>

                      <div class="cardnew">
                          <div class="content">
                              <img src="images/skills/nodejs.png" alt="Node.js">
                              <h2>Node.js</h2>
                          </div>
                      </div>

                      <div class="cardnew whitebackground">
                          <div class="content">
                              <img src="images/skills/sql.png" alt="SQL">
                              <h2>SQL</h2>
                          </div>
                      </div>

              </div>

          </div>

      </div>

    </div>

    <div class="section" id="portfolio">

        <div class="container">

            <div class="row">

                <div class="heading">
                    <h1>PORTFOLIO</h1>
                </div>

                <div class="filter">
                    <ul id="filters">

                        <li><a href="#" data-filter="*" class="current">All</a></li>
                        <li><a href="#" data-filter=".websites">Websites</a></li>
                        <li><a href="#" data-filter=".apps">Applications</a></li>
                        <li><a href="#" data-filter=".games">Games</a></li>

                    </ul>
                </div>

                <div class="itemsContainer">

                    <ul class="items">

                        <li class="apps col-xs-6 col-sm-4 col-md-3 col-lg-3">
                            <div class="portfolioItem">
                                <div class="cardnew">
                                    <div class="content">
                                        <img src="images/skills/react.png" alt="ReactJS">
                                        <h2>React</h2>
                                    </div>
                                </div>
                            </div>
                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </div>


    <script src="js/jquery.superslides.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/typed.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
     integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous"></script>

    <script src="https://unpkg.com/isotope-layout@3.0.6/dist/isotope.pkgd.min.js"></script>
    <script src="js/script.js"></script>

  </body>
</html>
